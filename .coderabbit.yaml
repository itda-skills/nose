# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# CodeRabbit automation is intentionally disabled for this repository.
# The GitHub App is installed at the corca-ai organization level. This file
# disables repository-owned automation and review scope; removing all manual
# command access still requires changing the organization app installation.
inheritance: false
early_access: false
enable_free_tier: false

reviews:
  request_changes_workflow: false
  abort_on_close: true
  path_filters:
    - "!**/*"
    - "!**/.*"
    - "!.*"
  path_instructions: []
  high_level_summary: false
  high_level_summary_placeholder: ""
  high_level_summary_in_walkthrough: false
  collapse_walkthrough: false
  review_details: false
  review_status: false
  commit_status: false
  fail_commit_status: false
  disable_cache: true
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  in_progress_fortune: false
  poem: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  labeling_instructions: []
  suggested_reviewers: false
  suggested_reviewers_instructions: []
  auto_assign_reviewers: false
  enable_prompt_for_ai_agents: false
  slop_detection:
    enabled: false
  auto_review:
    enabled: false
    auto_incremental_review: false
    auto_pause_after_reviewed_commits: 0
    description_keyword: ""
    labels: []
    drafts: false
    base_branches: []
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false
    custom: []
  pre_merge_checks:
    docstrings:
      mode: "off"
    title:
      mode: "off"
    issue_assessment:
      mode: "off"
    custom_checks: []
  tools:
    actionlint:
      enabled: false
    ast-grep:
      essential_rules: false
      packages: []
      rule_dirs: []
      util_dirs: []
    biome:
      enabled: false
    blinter:
      enabled: false
    brakeman:
      enabled: false
    buf:
      enabled: false
    checkmake:
      enabled: false
    checkov:
      enabled: false
    circleci:
      enabled: false
    clang:
      enabled: false
    clippy:
      enabled: false
    cppcheck:
      enabled: false
    detekt:
      enabled: false
    dotenvLint:
      enabled: false
    emberTemplateLint:
      enabled: false
    eslint:
      enabled: false
    fbinfer:
      enabled: false
    flake8:
      enabled: false
    fortitudeLint:
      enabled: false
    github-checks:
      enabled: false
    gitleaks:
      enabled: false
    golangci-lint:
      enabled: false
    hadolint:
      enabled: false
    htmlhint:
      enabled: false
    languagetool:
      enabled: false
    luacheck:
      enabled: false
    markdownlint:
      enabled: false
    opengrep:
      enabled: false
    osvScanner:
      enabled: false
    oxc:
      enabled: false
    phpcs:
      enabled: false
    phpmd:
      enabled: false
    phpstan:
      enabled: false
    pmd:
      enabled: false
    presidio:
      enabled: false
    prismaLint:
      enabled: false
    psscriptanalyzer:
      enabled: false
    pylint:
      enabled: false
    regal:
      enabled: false
    rubocop:
      enabled: false
    ruff:
      enabled: false
    semgrep:
      enabled: false
    shellcheck:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    smartyLint:
      enabled: false
    sqlfluff:
      enabled: false
    stylelint:
      enabled: false
    swiftlint:
      enabled: false
    tflint:
      enabled: false
    trivy:
      enabled: false
    trufflehog:
      enabled: false
    yamllint:
      enabled: false
    zizmor:
      enabled: false

chat:
  auto_reply: false
  art: false
  allow_non_org_members: false
  integrations:
    jira:
      usage: "disabled"
    linear:
      usage: "disabled"

issue_enrichment:
  auto_enrich:
    enabled: false
  labeling:
    auto_apply_labels: false
    labeling_instructions: []
  planning:
    enabled: false
    auto_planning:
      enabled: false
      labels: []

knowledge_base:
  opt_out: true
  automatic_repository_linking: false
  linked_repositories: []
  code_guidelines:
    enabled: false
    filePatterns: []
  web_search:
    enabled: false
  learnings:
    scope: "local"
    approval_delay: 30
  issues:
    scope: "local"
  jira:
    usage: "disabled"
    project_keys: []
  linear:
    usage: "disabled"
    team_keys: []
  pull_requests:
    scope: "local"
  mcp:
    usage: "disabled"
    disabled_servers: []
