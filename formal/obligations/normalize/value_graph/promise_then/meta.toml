id = "normalize.value_graph.promise_then"
status = "proven"
kind = "soundness"
summary = "A settled fulfilled Promise is modeled by its resolved value, so `p.then(λr. body r)` is the continuation applied to that value. The local Promise slice also models fulfilled/rejected channels for dependency-closed first-party `Promise.resolve`, `Promise.reject`, `.then`, and `.catch`: handler-returned `Promise.resolve` flattens, handler-returned `Promise.reject` preserves the rejected channel, and `catch(h)` agrees with `then(undefined, h)` for rejected local producers. Thenable assimilation, `.finally`, aggregates, custom receivers, and scheduling remain outside this proof and fail closed."

[rust]
rule_module = true
files = ["crates/nose-normalize/src/value_graph/rules/promise_then.rs"]
symbols = ["apply"]

[lean]
proof = "Proof.lean"
theorems = [
  "NosePromiseThen.then_eq_await_bind",
  "NosePromiseThen.then_chain",
  "NosePromiseThen.returned_resolve_flattens",
  "NosePromiseThen.returned_reject_preserves_channel",
  "NosePromiseThen.catch_recovers_rejected",
  "NosePromiseThen.catch_eq_then_rejection_handler",
]
